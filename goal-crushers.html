<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Goal Crushers</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --gold: #C8912A;
  --gold-light: #F0C96B;
  --gold-dim: #6B4E1A;
  --bg: #191919;
  --bg2: #222222;
  --bg3: #2a2a2a;
  --bg4: #313131;
  --border: rgba(255,255,255,0.08);
  --border-gold: rgba(200,145,42,0.3);
  --text: #F0EDE8;
  --text2: #888;
  --text3: #555;
  --green: #3DA882;
  --green-bg: rgba(61,168,130,0.1);
  --amber: #C8912A;
  --amber-bg: rgba(200,145,42,0.1);
  --red: #C0442A;
  --red-bg: rgba(192,68,42,0.1);
  --blue: #3A7FC1;
  --blue-bg: rgba(58,127,193,0.1);
  --focus-share: 0.55;
  --progress-share: 0.30;
  --maintain-share: 0.15;
  --radius: 10px;
  --radius-sm: 6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { background: #191919; color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }
body { max-width: 760px; margin: 0 auto; padding: 2rem 1.25rem 4rem; background: #191919; }

/* ── HEADER ── */
.app-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1.25rem; border-bottom: 0.5px solid var(--border); }
.app-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: -0.02em; }
.app-subtitle { font-size: 11px; color: var(--text3); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.1em; }
.week-badge { font-size: 12px; color: var(--text2); background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 5px 12px; }

/* ── TABS ── */
.tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; background: var(--bg2); border-radius: var(--radius); padding: 4px; border: 0.5px solid var(--border); }
.tab { flex: 1; padding: 7px; font-size: 12px; font-family: 'DM Mono', monospace; text-align: center; border: none; background: transparent; color: var(--text2); cursor: pointer; border-radius: var(--radius-sm); transition: all .2s; }
.tab:hover { color: var(--text); background: var(--bg3); }
.tab.active { background: var(--bg4); color: var(--gold); border: 0.5px solid var(--border-gold); }

/* ── SECTION LABELS ── */
.micro { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); margin-bottom: 6px; }

/* ── FOCUS INPUT ── */
.focus-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: .9rem 1.1rem; margin-bottom: 1rem; }
.bare-input { width: 100%; background: transparent; border: none; outline: none; font-size: 14px; color: var(--text); font-family: 'DM Mono', monospace; }
.bare-input::placeholder { color: var(--text3); }
.bare-input:disabled { color: var(--text2); cursor: default; }

/* ── TIER SECTIONS ── */
.tier-section { margin-bottom: .85rem; }
.tier-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: var(--radius-sm); margin-bottom: 5px; }
.tier-label { font-size: 12px; font-weight: 500; font-family: 'Syne', sans-serif; }
.tier-alloc { font-size: 11px; opacity: .7; font-family: 'DM Mono', monospace; }
.task-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 9px 11px; margin-bottom: 4px; }
.task-card.readonly { opacity: .85; }
.task-top { display: flex; align-items: center; gap: 8px; }
.task-name-input { flex: 1; background: transparent; border: none; outline: none; font-size: 13px; color: var(--text); font-family: 'DM Mono', monospace; }
.task-name-input::placeholder { color: var(--text3); }
.task-name-input:disabled { color: var(--text2); cursor: default; }
.pts-badge { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; white-space: nowrap; font-family: 'DM Mono', monospace; }
.del-btn { background: transparent; border: none; cursor: pointer; color: var(--text3); font-size: 15px; padding: 2px; border-radius: 4px; line-height: 1; transition: color .15s; }
.del-btn:hover { color: var(--red); }
.task-score-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; padding-top: 8px; border-top: 0.5px solid var(--border); }
.stype-btn { font-size: 11px; padding: 3px 9px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); background: transparent; cursor: pointer; color: var(--text2); font-family: 'DM Mono', monospace; transition: all .15s; }
.stype-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
.stype-btn.on { background: var(--bg4); color: var(--text); border-color: rgba(255,255,255,0.2); }
.score-inputs { display: flex; align-items: center; gap: 5px; margin-left: auto; }
.num-input { width: 50px; background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 3px 6px; font-size: 13px; color: var(--text); text-align: center; font-family: 'DM Mono', monospace; outline: none; }
.num-input:focus { border-color: var(--gold-dim); }
.num-input:disabled { color: var(--text2); cursor: default; }
.sep { font-size: 12px; color: var(--text3); }
.earned-preview { font-size: 11px; color: var(--text2); margin-left: 4px; white-space: nowrap; }
.done-badge { font-size: 11px; padding: 3px 10px; border-radius: var(--radius-sm); background: var(--green-bg); color: var(--green); border: 0.5px solid rgba(61,168,130,0.2); }

.add-task-row { display: flex; align-items: center; gap: 6px; padding: 7px 11px; cursor: pointer; border-radius: var(--radius); border: 0.5px dashed var(--border); transition: all .15s; }
.add-task-row:hover { background: var(--bg2); border-color: rgba(255,255,255,0.15); }
.add-task-row span { font-size: 12px; color: var(--text3); }
.add-task-row:hover span { color: var(--text2); }

/* ── SCORE CARD ── */
.score-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: .85rem; }
.score-row { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 8px; }
.score-big { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 700; color: var(--text); }
.score-right { text-align: right; }
.score-right .micro { margin-bottom: 3px; }
.needed-line { font-size: 13px; font-weight: 500; color: var(--text2); }
.bar-wrap { height: 3px; background: var(--bg4); border-radius: 2px; margin-bottom: 8px; }
.bar-fill { height: 100%; border-radius: 2px; transition: width .5s cubic-bezier(.4,0,.2,1), background .5s; }
.status-line { font-size: 12px; color: var(--text2); }

/* ── REWARDS ── */
.rewards-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: .85rem; }
.reward-rows { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
.reward-row { display: grid; grid-template-columns: 44px 1fr; gap: 10px; align-items: center; }
.r-tier { font-size: 11px; font-weight: 500; padding: 3px 0; border-radius: var(--radius-sm); text-align: center; font-family: 'DM Mono', monospace; }
.r-input { background: transparent; border: none; border-bottom: 0.5px solid var(--border); outline: none; font-size: 13px; color: var(--text); font-family: 'DM Mono', monospace; padding: 2px 0; width: 100%; transition: border-color .15s; }
.r-input:focus { border-color: var(--gold-dim); }
.r-input::placeholder { color: var(--text3); }
.r-input:disabled { color: var(--text2); cursor: default; }

/* ── BOTTOM BTNS ── */
.btn-row { display: flex; gap: 8px; }
.btn { flex: 1; padding: 9px; font-size: 12px; border: 0.5px solid var(--border); border-radius: var(--radius); background: transparent; cursor: pointer; color: var(--text2); font-family: 'DM Mono', monospace; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
.btn:hover { background: var(--bg3); color: var(--text); border-color: rgba(255,255,255,0.15); }
.btn.gold { border-color: var(--border-gold); color: var(--gold); }
.btn.gold:hover { background: rgba(200,145,42,0.08); }

/* ── HISTORY TAB ── */
.history-empty { text-align: center; padding: 3rem 0; color: var(--text3); font-size: 13px; }
.archive-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: .85rem; overflow: hidden; }
.archive-header { display: flex; align-items: center; justify-content: space-between; padding: .85rem 1.1rem; cursor: pointer; transition: background .15s; }
.archive-header:hover { background: var(--bg3); }
.archive-week { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; color: var(--text); }
.archive-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
.archive-score-badge { font-size: 13px; font-weight: 500; font-family: 'DM Mono', monospace; padding: 3px 10px; border-radius: var(--radius-sm); }
.archive-detail { padding: 0 1.1rem; max-height: 0; overflow: hidden; transition: max-height .3s ease, padding .3s; }
.archive-detail.open { max-height: 1000px; padding: .75rem 1.1rem; border-top: 0.5px solid var(--border); }
.archive-focus { font-size: 12px; color: var(--text2); margin-bottom: .75rem; font-style: italic; }
.archive-tier { margin-bottom: .6rem; }
.archive-tier-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin-bottom: 4px; }
.archive-task-row { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; border-bottom: 0.5px solid var(--border); font-size: 12px; color: var(--text2); }
.archive-task-row:last-child { border-bottom: none; }
.archive-task-score { color: var(--text); font-weight: 500; }

/* ── CHEVRON ── */
.chevron { font-size: 14px; color: var(--text3); transition: transform .25s; }
.chevron.open { transform: rotate(180deg); }

/* ── MODAL ── */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.5rem; width: 340px; max-width: 92vw; }
.modal h3 { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; margin-bottom: 8px; color: var(--text); }
.modal p { font-size: 12px; color: var(--text2); margin-bottom: 1.25rem; line-height: 1.7; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btn { padding: 7px 16px; border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; font-family: 'DM Mono', monospace; border: 0.5px solid var(--border); background: transparent; color: var(--text2); transition: all .15s; }
.modal-btn:hover { background: var(--bg3); color: var(--text); }
.modal-btn.primary { background: var(--gold); color: #000; border-color: transparent; font-weight: 500; }
.modal-btn.primary:hover { background: var(--gold-light); }

/* ── TIER COLOR THEMES ── */
.tier-focus .tier-header { background: rgba(200,145,42,0.08); }
.tier-focus .tier-label { color: var(--gold); }
.tier-focus .tier-alloc { color: var(--gold); }
.tier-focus .pts-badge { background: rgba(200,145,42,0.12); color: var(--gold); }
.tier-progress .tier-header { background: rgba(61,168,130,0.07); }
.tier-progress .tier-label { color: var(--green); }
.tier-progress .tier-alloc { color: var(--green); }
.tier-progress .pts-badge { background: rgba(61,168,130,0.1); color: var(--green); }
.tier-maintain .tier-header { background: rgba(58,127,193,0.07); }
.tier-maintain .tier-label { color: var(--blue); }
.tier-maintain .tier-alloc { color: var(--blue); }
.tier-maintain .pts-badge { background: rgba(58,127,193,0.1); color: var(--blue); }

svg { display: inline-block; vertical-align: middle; }
</style>
</head>
<body>

<div id="modal-root"></div>

<div class="app-header">
  <div>
    <div class="app-title">◈ Goal Crushers</div>
    <div class="app-subtitle">Weekly accountability tracker</div>
  </div>
  <div class="week-badge" id="week-label">Week —</div>
</div>

<div class="tabs">
  <button class="tab active" id="tab-current" onclick="switchTab('current')">Current week</button>
  <button class="tab" id="tab-prev" onclick="switchTab('prev')">Previous week</button>
  <button class="tab" id="tab-history" onclick="switchTab('history')">History</button>
</div>

<div id="view-current"></div>
<div id="view-prev" style="display:none"></div>
<div id="view-history" style="display:none"></div>

<script>
const TIERS = [
  { key:'focus',    label:'Focus',       share:.55, cls:'tier-focus' },
  { key:'progress', label:'Progress',    share:.30, cls:'tier-progress' },
  { key:'maintain', label:'Maintenance', share:.15, cls:'tier-maintain' },
];
const REWARD_TIERS = [
  { label:'7+', pct:70,  color:'#3DA882', bg:'rgba(61,168,130,0.12)' },
  { label:'8+', pct:80,  color:'#3A7FC1', bg:'rgba(58,127,193,0.12)' },
  { label:'9+', pct:90,  color:'#C8912A', bg:'rgba(200,145,42,0.12)' },
  { label:'10', pct:100, color:'#C0442A', bg:'rgba(192,68,42,0.12)' },
];

function blankWeek(weekNum, weekStart) {
  return {
    weekNumber: weekNum,
    weekStart: weekStart || getWeekStart(),
    focus: '',
    tasks: { focus:[], progress:[], maintain:[] },
    rewards: {'7+':'','8+':'','9+':'','10':''},
  };
}

function getWeekNum(d) {
  return 68;
}

function getWeekStart(d) {
  d = d ? new Date(d) : new Date();
  const day = d.getDay();
  const diff = d.getDate() - day + (day===0 ? -6 : 1);
  const mon = new Date(d.setDate(diff));
  return mon.toISOString().slice(0,10);
}

function formatDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});
}

function uid() { return Date.now() + Math.random(); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

let state = { current: null, previous: null, history: [] };

function load() {
  try {
    const raw = localStorage.getItem('gc_app_v2');
    if (raw) state = JSON.parse(raw);
  } catch(e) {}

  const wn = getWeekNum();
  const ws = getWeekStart();

  if (!state.current || state.current.weekNumber !== wn) {
    if (state.current && state.current.weekNumber !== wn) archiveCurrent();
    state.current = blankWeek(wn, ws);
  }

  if (!state.history) state.history = [];
  save();
  render();
}

function save() {
  try { localStorage.setItem('gc_app_v2', JSON.stringify(state)); } catch(e) {}
}

function archiveCurrent() {
  if (!state.current) return;
  const { total } = calcPoints(state.current);
  const entry = { ...state.current, finalScore: parseFloat(total.toFixed(2)) };

  if (state.previous) {
    state.history.unshift(state.previous);
  }
  state.previous = entry;
}

function calcPoints(week) {
  let totalEarned = 0;
  const breakdown = {};
  TIERS.forEach(tier => {
    const tasks = week.tasks[tier.key] || [];
    const tierTotal = tier.share * 10;
    const perTask = tasks.length > 0 ? tierTotal / tasks.length : 0;
    let tierEarned = 0;
    tasks.forEach(t => {
      let ratio = 0;
      if (t.type === 'done') {
        ratio = (parseFloat(t.done)||0) >= 1 ? 1 : 0;
      } else {
        const tgt = parseFloat(t.target)||1;
        const dn = parseFloat(t.done)||0;
        ratio = Math.min(dn/tgt, 1);
      }
      tierEarned += ratio * perTask;
    });
    breakdown[tier.key] = { earned: tierEarned, total: tierTotal, perTask };
    totalEarned += tierEarned;
  });
  return { total: Math.min(totalEarned, 10), breakdown };
}

/* ─── WEEK EDITOR ─── */
function buildWeekEditor(week, container, readonly) {
  container.innerHTML = '';

  // Focus
  const fc = document.createElement('div');
  fc.className = 'focus-card';
  fc.innerHTML = `<div class="micro">This week's focus</div>
    <input class="bare-input" placeholder="What are you zeroing in on this week?" value="${esc(week.focus)}" ${readonly?'disabled':''} />`;
  if (!readonly) {
    fc.querySelector('input').addEventListener('input', e => { week.focus = e.target.value; save(); });
  }
  container.appendChild(fc);

  // Tiers
  const tiersWrap = document.createElement('div');
  tiersWrap.id = container.id + '_tiers';
  container.appendChild(tiersWrap);

  // Score
  const scoreCard = document.createElement('div');
  scoreCard.className = 'score-card';
  scoreCard.id = container.id + '_score';
  container.appendChild(scoreCard);

  // Rewards
  const rewardsCard = document.createElement('div');
  rewardsCard.className = 'rewards-card';
  rewardsCard.id = container.id + '_rewards';
  container.appendChild(rewardsCard);

  if (!readonly) {
    const btnRow = document.createElement('div');
    btnRow.className = 'btn-row';
    btnRow.innerHTML = `<button class="btn gold" onclick="saveWeek()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg>
      Save
    </button>
    <button class="btn" onclick="confirmNewWeek()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
      New week
    </button>`;
    container.appendChild(btnRow);
  }

  renderWeekEditor(week, container, readonly);
}

function renderWeekEditor(week, container, readonly) {
  const tiersWrap = document.getElementById(container.id + '_tiers');
  if (!tiersWrap) return;
  const { breakdown } = calcPoints(week);
  tiersWrap.innerHTML = '';

  TIERS.forEach(tier => {
    const tasks = week.tasks[tier.key] || [];
    const bd = breakdown[tier.key];
    const ptsLabel = tasks.length > 0
      ? `${bd.total.toFixed(1)}pt pool · ${bd.perTask.toFixed(1)}pt each`
      : `${bd.total.toFixed(1)}pt pool`;

    const sec = document.createElement('div');
    sec.className = `tier-section ${tier.cls}`;

    const hdr = document.createElement('div');
    hdr.className = 'tier-header';
    hdr.innerHTML = `<span class="tier-label">${tier.label}</span><span class="tier-alloc">${ptsLabel}</span>`;
    sec.appendChild(hdr);

    tasks.forEach(t => {
      let ratio = 0;
      if (t.type==='done') ratio = (parseFloat(t.done)||0)>=1?1:0;
      else { const tgt=parseFloat(t.target)||1; ratio=Math.min((parseFloat(t.done)||0)/tgt,1); }
      const earnedPts = ratio * bd.perTask;

      const card = document.createElement('div');
      card.className = 'task-card' + (readonly?' readonly':'');

      let scoreSection = '';
      if (readonly) {
        if (t.type==='done') {
          scoreSection = `<span class="done-badge">${(parseFloat(t.done)||0)>=1?'✓ Done':'Not done'}</span>`;
        } else {
          scoreSection = `<span class="earned-preview">${parseFloat(t.done)||0} / ${t.target} → ${earnedPts.toFixed(1)}pt</span>`;
        }
      } else {
        if (t.type==='done') {
          const isDone = (parseFloat(t.done)||0)>=1;
          scoreSection = `<div class="score-inputs">
            <button class="stype-btn ${isDone?'on':''}" onclick="toggleDone('${week===state.current?'c':'p'}','${tier.key}',${t.id},${isDone?0:1},this)">${isDone?'✓ Done':'Mark done'}</button>
          </div>`;
        } else {
          scoreSection = `<div class="score-inputs">
            <input class="num-input" type="number" min="0" value="${t.done||0}" oninput="updateTask('${week===state.current?'c':'p'}','${tier.key}',${t.id},'done',this.value)" />
            <span class="sep">/</span>
            <input class="num-input" type="number" min="1" value="${t.target||20}" oninput="updateTask('${week===state.current?'c':'p'}','${tier.key}',${t.id},'target',this.value)" />
            <span class="earned-preview">${earnedPts.toFixed(2)}pt</span>
          </div>`;
        }
      }

      const typeRow = readonly ? '' : `
        <div class="task-score-row">
          <div style="display:flex;gap:3px">
            <button class="stype-btn ${t.type==='done'?'on':''}" onclick="setType('${week===state.current?'c':'p'}','${tier.key}',${t.id},'done')">Done/not done</button>
            <button class="stype-btn ${t.type==='qty'?'on':''}" onclick="setType('${week===state.current?'c':'p'}','${tier.key}',${t.id},'qty')">Quantity</button>
          </div>
          ${scoreSection}
        </div>`;

      const readonlyScore = readonly ? `<div style="margin-top:6px;padding-top:6px;border-top:0.5px solid var(--border);display:flex;justify-content:flex-end">${scoreSection}</div>` : '';

      card.innerHTML = `
        <div class="task-top">
          <input class="task-name-input" value="${esc(t.name)}" placeholder="Describe task specifically..." ${readonly?'disabled':''} oninput="updateTask('${week===state.current?'c':'p'}','${tier.key}',${t.id},'name',this.value)" />
          <span class="pts-badge">${bd.perTask.toFixed(1)}pt</span>
          ${readonly?'':'<button class="del-btn" onclick="removeTask(\''+( week===state.current?'c':'p')+'\',\''+tier.key+'\','+t.id+')">✕</button>'}
        </div>
        ${typeRow}
        ${readonlyScore}`;
      sec.appendChild(card);
    });

    if (!readonly) {
      const addRow = document.createElement('div');
      addRow.className = 'add-task-row';
      addRow.onclick = () => addTask(week===state.current?'c':'p', tier.key);
      addRow.innerHTML = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>Add ${tier.label.toLowerCase()} task</span>`;
      sec.appendChild(addRow);
    }

    tiersWrap.appendChild(sec);
  });

  renderScoreCard(week, container);
  renderRewardsCard(week, container, readonly);
}

function renderScoreCard(week, container) {
  const sc = document.getElementById(container.id + '_score');
  if (!sc) return;
  const { total } = calcPoints(week);
  const pct = total * 10;
  const barColor = pct >= 70 ? '#3DA882' : pct >= 50 ? '#C8912A' : '#C0442A';
  const needed = Math.max(0, 7 - total).toFixed(1);
  let msg = '';
  if (total>=10) msg='Perfect week. Claim your top reward.';
  else if(total>=9) msg='Outstanding — 9+ reward unlocked.';
  else if(total>=8) msg='8+ reward unlocked. Can you push to 9?';
  else if(total>=7) msg='Reward unlocked. Push for 8.';
  else if(total>0)  msg=`${needed}pt to unlock your reward — stay consistent.`;
  else msg='Add tasks and update scores throughout the week.';

  sc.innerHTML = `
    <div class="score-row">
      <div><div class="micro">Score</div><div class="score-big">${total.toFixed(1)} <span style="font-size:18px;color:var(--text3)">/ 10</span></div></div>
      <div class="score-right"><div class="micro">Reward from</div><div class="needed-line">${total>=7?'<span style="color:var(--green)">Unlocked ✓</span>':needed+'pt needed'}</div></div>
    </div>
    <div class="bar-wrap"><div class="bar-fill" style="width:${pct}%;background:${barColor}"></div></div>
    <div class="status-line">${msg}</div>`;
}

function renderRewardsCard(week, container, readonly) {
  const rc = document.getElementById(container.id + '_rewards');
  if (!rc) return;
  const { total } = calcPoints(week);
  rc.innerHTML = `<div class="micro">Rewards</div><div class="reward-rows" id="${container.id}_rrows"></div>`;
  const rrows = document.getElementById(container.id + '_rrows');
  REWARD_TIERS.forEach(rt => {
    const active = total*10 >= rt.pct;
    const row = document.createElement('div');
    row.className = 'reward-row';
    row.innerHTML = `
      <span class="r-tier" style="background:${rt.bg};color:${rt.color};${active?`outline:1.5px solid ${rt.color};`:''}">${rt.label}</span>
      <input class="r-input" value="${esc(week.rewards[rt.label]||'')}" placeholder="Set reward..." ${readonly?'disabled':''}
        oninput="updateReward('${week===state.current?'c':'p'}','${rt.label}',this.value)" />`;
    rrows.appendChild(row);
  });
}

/* ─── MUTATIONS ─── */
function getWeek(wk) { return wk==='c' ? state.current : state.previous; }

function addTask(wk, tierKey) {
  const w = getWeek(wk);
  if (!w) return;
  w.tasks[tierKey].push({ id: uid(), name:'', type:'done', done:0, target:1 });
  save(); rerenderWeek(wk);
}

function removeTask(wk, tierKey, id) {
  const w = getWeek(wk);
  if (!w) return;
  w.tasks[tierKey] = w.tasks[tierKey].filter(t=>t.id!==id);
  save(); rerenderWeek(wk);
}

function updateTask(wk, tierKey, id, field, val) {
  const w = getWeek(wk);
  if (!w) return;
  const t = w.tasks[tierKey].find(t=>t.id===id);
  if (!t) return;
  if (field==='done'||field==='target') {
    const n = parseFloat(val); t[field] = isNaN(n)||n<0?0:n;
  } else { t[field]=val; }
  save(); rerenderWeek(wk);
}

function setType(wk, tierKey, id, type) {
  const w = getWeek(wk);
  if (!w) return;
  const t = w.tasks[tierKey].find(t=>t.id===id);
  if (!t) return;
  t.type = type;
  if (type==='done'){t.done=0;t.target=1;}
  else{t.done=0;t.target=20;}
  save(); rerenderWeek(wk);
}

function toggleDone(wk, tierKey, id, val) {
  updateTask(wk, tierKey, id, 'done', val);
}

function updateReward(wk, tier, val) {
  const w = getWeek(wk);
  if (!w) return;
  w.rewards[tier] = val; save();
}

function saveWeek() { save(); showToast('Saved'); }

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText='position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg4);border:0.5px solid var(--border);padding:8px 18px;border-radius:var(--radius);font-size:12px;color:var(--text2);z-index:999;transition:opacity .3s';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300);},1500);
}

/* ─── WEEK RERENDER ─── */
let currentWeekContainer, prevWeekContainer;

function rerenderWeek(wk) {
  if (wk==='c' && currentWeekContainer) renderWeekEditor(state.current, currentWeekContainer, false);
  if (wk==='p' && prevWeekContainer) renderWeekEditor(state.previous, prevWeekContainer, !state.previous);
}

/* ─── HISTORY TAB ─── */
function buildHistory(container) {
  container.innerHTML = '';
  if (!state.history || state.history.length===0) {
    container.innerHTML = '<div class="history-empty">No completed weeks yet.<br/>Finish a week and start a new one to see history here.</div>';
    return;
  }
  state.history.forEach((week, idx) => {
    const { total } = calcPoints(week);
    const pct = total * 10;
    const scoreColor = pct>=70?'var(--green)':pct>=50?'var(--amber)':'var(--red)';
    const scoreBg = pct>=70?'var(--green-bg)':pct>=50?'var(--amber-bg)':'var(--red-bg)';
    const dateStr = week.weekStart ? `w/c ${formatDate(week.weekStart)}` : `Week ${week.weekNumber}`;

    const card = document.createElement('div');
    card.className = 'archive-card';
    card.innerHTML = `
      <div class="archive-header" onclick="toggleArchive(${idx},this)">
        <div>
          <div class="archive-week">Week ${week.weekNumber}</div>
          <div class="archive-meta">${dateStr}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="archive-score-badge" style="background:${scoreBg};color:${scoreColor}">${(week.finalScore||total).toFixed(1)} / 10</span>
          <span class="chevron">▾</span>
        </div>
      </div>
      <div class="archive-detail" id="archive-detail-${idx}">
        ${week.focus?`<div class="archive-focus">"${esc(week.focus)}"</div>`:''}
        ${TIERS.map(tier=>{
          const tasks = week.tasks[tier.key]||[];
          if(!tasks.length) return '';
          const bd = calcPoints(week).breakdown[tier.key];
          return `<div class="archive-tier">
            <div class="archive-tier-label">${tier.label}</div>
            ${tasks.map(t=>{
              let scoreStr = '';
              if(t.type==='done') scoreStr=(parseFloat(t.done)||0)>=1?'Done':'Not done';
              else scoreStr=`${t.done||0}/${t.target}`;
              return `<div class="archive-task-row">
                <span>${esc(t.name)||'(unnamed)'}</span>
                <span class="archive-task-score">${scoreStr}</span>
              </div>`;
            }).join('')}
          </div>`;
        }).join('')}
      </div>`;
    container.appendChild(card);
  });
}

function toggleArchive(idx, hdr) {
  const detail = document.getElementById(`archive-detail-${idx}`);
  const chevron = hdr.querySelector('.chevron');
  detail.classList.toggle('open');
  chevron.classList.toggle('open');
}

/* ─── TAB SWITCHING ─── */
let activeTab = 'current';

function switchTab(tab) {
  activeTab = tab;
  ['current','prev','history'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('view-'+t).style.display = t===tab?'block':'none';
  });
  if (tab==='history') buildHistory(document.getElementById('view-history'));
}

/* ─── NEW WEEK ─── */
function confirmNewWeek() {
  document.getElementById('modal-root').innerHTML = `
    <div class="modal-bg"><div class="modal">
      <h3>Start a new week?</h3>
      <p>Your current week will be saved to history. The previous week will also archive. Make sure you've submitted your weekend accountability first.</p>
      <div class="modal-btns">
        <button class="modal-btn" onclick="closeModal()">Cancel</button>
        <button class="modal-btn primary" onclick="doNewWeek()">Start new week</button>
      </div>
    </div></div>`;
}
function closeModal() { document.getElementById('modal-root').innerHTML=''; }
function doNewWeek() {
  closeModal();
  archiveCurrent();
  const wn = getWeekNum();
  const ws = getWeekStart();
  state.current = blankWeek(wn, ws);
  save();
  render();
  switchTab('current');
}

/* ─── MAIN RENDER ─── */
function render() {
  document.getElementById('week-label').textContent = `Week ${state.current?.weekNumber || '—'}`;

  const vc = document.getElementById('view-current');
  vc.id = 'view-current';
  buildWeekEditor(state.current, vc, false);
  currentWeekContainer = vc;

  const vp = document.getElementById('view-prev');
  vp.id = 'view-prev';
  if (state.previous) {
    buildWeekEditor(state.previous, vp, false);
    prevWeekContainer = vp;
  } else {
    vp.innerHTML = '<div class="history-empty">No previous week yet.</div>';
  }

  if (activeTab==='history') buildHistory(document.getElementById('view-history'));
}

load();
</script>
</body>
