<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Goal Crushers</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
:root {
  --gold: #C8912A; --gold-light: #F0C96B; --gold-dim: #6B4E1A;
  --bg: #191919; --bg2: #222222; --bg3: #2a2a2a; --bg4: #313131;
  --border: rgba(255,255,255,0.08);
  --border-gold: rgba(200,145,42,0.3);
  --text: #F0EDE8; --text2: #888; --text3: #555;
  --green: #3DA882; --green-bg: rgba(61,168,130,0.1);
  --amber: #C8912A; --amber-bg: rgba(200,145,42,0.1);
  --red: #C0442A; --red-bg: rgba(192,68,42,0.1);
  --blue: #3A7FC1; --blue-bg: rgba(58,127,193,0.1);
  --radius: 10px; --radius-sm: 6px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #191919; color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; }
body { max-width: 760px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

.app-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 2rem; padding-bottom: 1.25rem; border-bottom: 0.5px solid var(--border); }
.app-title { font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 700; color: var(--gold); letter-spacing: -0.02em; }
.app-subtitle { font-size: 11px; color: var(--text3); margin-top: 3px; text-transform: uppercase; letter-spacing: 0.1em; }
.week-badge { font-size: 12px; color: var(--text2); background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 5px 12px; }

.tabs { display: flex; gap: 4px; margin-bottom: 1.5rem; background: var(--bg2); border-radius: var(--radius); padding: 4px; border: 0.5px solid var(--border); }
.tab { flex: 1; padding: 7px; font-size: 12px; font-family: 'DM Mono', monospace; text-align: center; border: none; background: transparent; color: var(--text2); cursor: pointer; border-radius: var(--radius-sm); transition: all .2s; }
.tab:hover { color: var(--text); background: var(--bg3); }
.tab.active { background: var(--bg4); color: var(--gold); border: 0.5px solid var(--border-gold); }

.micro { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text3); margin-bottom: 6px; }
.focus-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: .9rem 1.1rem; margin-bottom: 1rem; }
.bare-input { width: 100%; background: transparent; border: none; outline: none; font-size: 14px; color: var(--text); font-family: 'DM Mono', monospace; }
.bare-input::placeholder { color: var(--text3); }
.bare-input:disabled { color: var(--text2); cursor: default; }

.tier-section { margin-bottom: .85rem; }
.tier-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 12px; border-radius: var(--radius-sm); margin-bottom: 5px; }
.tier-label { font-size: 12px; font-weight: 500; font-family: 'Syne', sans-serif; }
.tier-alloc { font-size: 11px; opacity: .7; font-family: 'DM Mono', monospace; }

.task-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 9px 11px; margin-bottom: 4px; }
.task-top { display: flex; align-items: center; gap: 8px; }
.task-name-input { flex: 1; background: transparent; border: none; outline: none; font-size: 13px; color: var(--text); font-family: 'DM Mono', monospace; }
.task-name-input::placeholder { color: var(--text3); }
.task-name-input:disabled { color: var(--text2); cursor: default; }
.pts-badge { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; white-space: nowrap; font-family: 'DM Mono', monospace; }
.del-btn { background: transparent; border: none; cursor: pointer; color: var(--text3); font-size: 15px; padding: 2px; border-radius: 4px; line-height: 1; transition: color .15s; }
.del-btn:hover { color: var(--red); }

.task-score-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; padding-top: 8px; border-top: 0.5px solid var(--border); }
.stype-btn { font-size: 11px; padding: 3px 9px; border: 0.5px solid var(--border); border-radius: var(--radius-sm); background: transparent; cursor: pointer; color: var(--text2); font-family: 'DM Mono', monospace; transition: all .15s; }
.stype-btn:hover { color: var(--text); }
.stype-btn.on { background: var(--bg4); color: var(--text); border-color: rgba(255,255,255,0.2); }
.score-inputs { display: flex; align-items: center; gap: 5px; margin-left: auto; }
.num-input { width: 50px; background: var(--bg3); border: 0.5px solid var(--border); border-radius: var(--radius-sm); padding: 3px 6px; font-size: 13px; color: var(--text); text-align: center; font-family: 'DM Mono', monospace; outline: none; }
.num-input:focus { border-color: var(--gold-dim); }
.sep { font-size: 12px; color: var(--text3); }
.earned-preview { font-size: 11px; color: var(--text2); margin-left: 4px; white-space: nowrap; }
.done-badge { font-size: 11px; padding: 3px 10px; border-radius: var(--radius-sm); background: var(--green-bg); color: var(--green); border: 0.5px solid rgba(61,168,130,0.2); }

.add-task-row { display: flex; align-items: center; gap: 6px; padding: 7px 11px; cursor: pointer; border-radius: var(--radius); border: 0.5px dashed var(--border); transition: all .15s; }
.add-task-row:hover { background: var(--bg2); border-color: rgba(255,255,255,0.15); }
.add-task-row span { font-size: 12px; color: var(--text3); }
.add-task-row:hover span { color: var(--text2); }

.score-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: .85rem; }
.score-row { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 8px; }
.score-big { font-family: 'Syne', sans-serif; font-size: 32px; font-weight: 700; color: var(--text); }
.bar-wrap { height: 3px; background: var(--bg4); border-radius: 2px; margin-bottom: 8px; }
.bar-fill { height: 100%; border-radius: 2px; transition: width .5s, background .5s; }
.status-line { font-size: 12px; color: var(--text2); }

.rewards-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1rem 1.25rem; margin-bottom: .85rem; }
.reward-rows { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
.reward-row { display: grid; grid-template-columns: 44px 1fr; gap: 10px; align-items: center; }
.r-tier { font-size: 11px; font-weight: 500; padding: 3px 0; border-radius: var(--radius-sm); text-align: center; font-family: 'DM Mono', monospace; }
.r-input { background: transparent; border: none; border-bottom: 0.5px solid var(--border); outline: none; font-size: 13px; color: var(--text); font-family: 'DM Mono', monospace; padding: 2px 0; width: 100%; }
.r-input:focus { border-color: var(--gold-dim); }
.r-input::placeholder { color: var(--text3); }
.r-input:disabled { color: var(--text2); cursor: default; }

.btn-row { display: flex; gap: 8px; }
.btn { flex: 1; padding: 9px; font-size: 12px; border: 0.5px solid var(--border); border-radius: var(--radius); background: transparent; cursor: pointer; color: var(--text2); font-family: 'DM Mono', monospace; transition: all .15s; display: flex; align-items: center; justify-content: center; gap: 6px; }
.btn:hover { background: var(--bg3); color: var(--text); }
.btn.gold { border-color: var(--border-gold); color: var(--gold); }
.btn.gold:hover { background: rgba(200,145,42,0.08); }

.history-empty { text-align: center; padding: 3rem 0; color: var(--text3); font-size: 13px; }
.archive-card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); margin-bottom: .85rem; overflow: hidden; }
.archive-header { display: flex; align-items: center; justify-content: space-between; padding: .85rem 1.1rem; cursor: pointer; }
.archive-header:hover { background: var(--bg3); }
.archive-week { font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 600; color: var(--text); }
.archive-meta { font-size: 11px; color: var(--text3); margin-top: 2px; }
.archive-score-badge { font-size: 13px; font-weight: 500; font-family: 'DM Mono', monospace; padding: 3px 10px; border-radius: var(--radius-sm); }
.archive-detail { padding: 0 1.1rem; max-height: 0; overflow: hidden; transition: max-height .3s, padding .3s; }
.archive-detail.open { max-height: 1000px; padding: .75rem 1.1rem; border-top: 0.5px solid var(--border); }
.archive-focus { font-size: 12px; color: var(--text2); margin-bottom: .75rem; font-style: italic; }
.archive-tier-label { font-size: 10px; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); margin-bottom: 4px; margin-top: 8px; }
.archive-task-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 0.5px solid var(--border); font-size: 12px; color: var(--text2); }
.archive-task-row:last-child { border-bottom: none; }
.archive-task-score { color: var(--text); font-weight: 500; }
.chevron { font-size: 14px; color: var(--text3); transition: transform .25s; display: inline-block; }
.chevron.open { transform: rotate(180deg); }

.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7); display: flex; align-items: center; justify-content: center; z-index: 100; }
.modal { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 1.5rem; width: 340px; max-width: 92vw; }
.modal h3 { font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 600; margin-bottom: 8px; }
.modal p { font-size: 12px; color: var(--text2); margin-bottom: 1.25rem; line-height: 1.7; }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
.modal-btn { padding: 7px 16px; border-radius: var(--radius-sm); font-size: 12px; cursor: pointer; font-family: 'DM Mono', monospace; border: 0.5px solid var(--border); background: transparent; color: var(--text2); }
.modal-btn.primary { background: var(--gold); color: #000; border-color: transparent; font-weight: 500; }

.tier-focus .tier-header { background: rgba(200,145,42,0.08); }
.tier-focus .tier-label { color: var(--gold); }
.tier-focus .tier-alloc { color: var(--gold); }
.tier-focus .pts-badge { background: rgba(200,145,42,0.12); color: var(--gold); }
.tier-progress .tier-header { background: rgba(61,168,130,0.07); }
.tier-progress .tier-label { color: var(--green); }
.tier-progress .tier-alloc { color: var(--green); }
.tier-progress .pts-badge { background: rgba(61,168,130,0.1); color: var(--green); }
.tier-maintain .tier-header { background: rgba(58,127,193,0.07); }
.tier-maintain .tier-label { color: var(--blue); }
.tier-maintain .tier-alloc { color: var(--blue); }
.tier-maintain .pts-badge { background: rgba(58,127,193,0.1); color: var(--blue); }
</style>
</head>
<body>
<div id="modal-root"></div>
<div class="app-header">
  <div>
    <div class="app-title">◈ Goal Crushers</div>
    <div class="app-subtitle">Weekly accountability tracker</div>
  </div>
  <div class="week-badge" id="week-label">Week —</div>
</div>
<div class="tabs">
  <button class="tab active" id="tab-current" onclick="switchTab('current')">Current week</button>
  <button class="tab" id="tab-prev" onclick="switchTab('prev')">Previous week</button>
  <button class="tab" id="tab-history" onclick="switchTab('history')">History</button>
</div>
<div id="view-current"></div>
<div id="view-prev" style="display:none"></div>
<div id="view-history" style="display:none"></div>

<script>
// ── CONSTANTS ──
const TIERS = [
  { key:'focus',    label:'Focus',       share:.55, cls:'tier-focus' },
  { key:'progress', label:'Progress',    share:.30, cls:'tier-progress' },
  { key:'maintain', label:'Maintenance', share:.15, cls:'tier-maintain' },
];
const REWARD_TIERS = [
  { label:'7+', pct:70,  color:'#3DA882', bg:'rgba(61,168,130,0.12)' },
  { label:'8+', pct:80,  color:'#3A7FC1', bg:'rgba(58,127,193,0.12)' },
  { label:'9+', pct:90,  color:'#C8912A', bg:'rgba(200,145,42,0.12)' },
  { label:'10', pct:100, color:'#C0442A', bg:'rgba(192,68,42,0.12)' },
];

// ── STATE ──
let state = { current: null, previous: null, history: [] };

function blankWeek(weekNum, weekStart) {
  return { weekNumber: weekNum, weekStart: weekStart || getWeekStart(), focus: '', tasks: { focus:[], progress:[], maintain:[] }, rewards: {'7+':'','8+':'','9+':'','10':''} };
}
function getWeekNum() { return 68; }
function getWeekStart() {
  const d = new Date(), day = d.getDay();
  const diff = d.getDate() - day + (day===0 ? -6 : 1);
  return new Date(new Date(d).setDate(diff)).toISOString().slice(0,10);
}
function formatDate(iso) {
  return new Date(iso+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});
}
function uid() { return Date.now() + Math.random(); }
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── PERSISTENCE ──
function load() {
  try { const r = localStorage.getItem('gc_v3'); if (r) state = JSON.parse(r); } catch(e) {}
  if (!state.current || state.current.weekNumber !== getWeekNum()) {
    if (state.current) archiveCurrent();
    state.current = blankWeek(getWeekNum(), getWeekStart());
  }
  if (!state.history) state.history = [];
  save();
  renderAll();
}
function save() {
  try { localStorage.setItem('gc_v3', JSON.stringify(state)); } catch(e) {}
}

// ── CALCULATIONS ──
function calcPoints(week) {
  let total = 0;
  const breakdown = {};
  TIERS.forEach(tier => {
    const tasks = week.tasks[tier.key] || [];
    const tierTotal = tier.share * 10;
    const perTask = tasks.length > 0 ? tierTotal / tasks.length : 0;
    let earned = 0;
    tasks.forEach(t => {
      let ratio = t.type==='done' ? ((parseFloat(t.done)||0)>=1?1:0) : Math.min((parseFloat(t.done)||0)/(parseFloat(t.target)||1),1);
      earned += ratio * perTask;
    });
    breakdown[tier.key] = { earned, total: tierTotal, perTask };
    total += earned;
  });
  return { total: Math.min(total, 10), breakdown };
}

// ── ARCHIVE ──
function archiveCurrent() {
  if (!state.current) return;
  const { total } = calcPoints(state.current);
  const entry = { ...state.current, finalScore: parseFloat(total.toFixed(2)) };
  if (state.previous) state.history.unshift(state.previous);
  state.previous = entry;
}

// ── TAB ──
let activeTab = 'current';
function switchTab(tab) {
  activeTab = tab;
  ['current','prev','history'].forEach(t => {
    document.getElementById('tab-'+t).classList.toggle('active', t===tab);
    document.getElementById('view-'+t).style.display = t===tab ? 'block' : 'none';
  });
  if (tab==='history') renderHistory();
}

// ── RENDER ALL ──
function renderAll() {
  document.getElementById('week-label').textContent = 'Week ' + (state.current?.weekNumber || '—');
  renderWeek('current');
  renderWeek('prev');
}

// ── RENDER WEEK ──
// This is the ONLY place DOM is built for a week. It runs ONCE on load/tab switch.
// After that, individual update functions patch specific elements in-place.
function renderWeek(which) {
  const container = document.getElementById('view-' + which);
  const week = which==='current' ? state.current : state.previous;
  const readonly = which==='prev' ? false : false; // both editable
  container.innerHTML = '';
  if (!week) { container.innerHTML = '<div class="history-empty">No previous week yet.</div>'; return; }

  const wk = which==='current' ? 'c' : 'p';

  // Focus input
  const fc = document.createElement('div');
  fc.className = 'focus-card';
  fc.innerHTML = '<div class="micro">This week\'s focus</div>';
  const focusInput = document.createElement('input');
  focusInput.className = 'bare-input';
  focusInput.placeholder = 'What are you zeroing in on this week?';
  focusInput.value = week.focus || '';
  focusInput.addEventListener('keydown', e => e.stopPropagation());
  focusInput.addEventListener('input', function() { week.focus = this.value; save(); });
  fc.appendChild(focusInput);
  container.appendChild(fc);

  // Tiers
  const { breakdown } = calcPoints(week);
  TIERS.forEach(tier => {
    const tasks = week.tasks[tier.key] || [];
    const bd = breakdown[tier.key];
    const sec = document.createElement('div');
    sec.className = 'tier-section ' + tier.cls;
    sec.id = which + '_tier_' + tier.key;

    const hdr = document.createElement('div');
    hdr.className = 'tier-header';
    hdr.innerHTML = '<span class="tier-label">' + tier.label + '</span><span class="tier-alloc" id="' + which + '_alloc_' + tier.key + '">' + allocLabel(bd, tasks.length) + '</span>';
    sec.appendChild(hdr);

    const taskList = document.createElement('div');
    taskList.id = which + '_tasklist_' + tier.key;
    tasks.forEach(t => taskList.appendChild(makeTaskCard(t, tier, bd, wk, which)));
    sec.appendChild(taskList);

    const addRow = document.createElement('div');
    addRow.className = 'add-task-row';
    addRow.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span>Add ' + tier.label.toLowerCase() + ' task</span>';
    addRow.addEventListener('click', () => doAddTask(wk, which, tier.key));
    sec.appendChild(addRow);

    container.appendChild(sec);
  });

  // Score card
  const scoreDiv = document.createElement('div');
  scoreDiv.className = 'score-card';
  scoreDiv.id = which + '_score';
  container.appendChild(scoreDiv);
  updateScoreCard(which, week);

  // Rewards
  const rewardsDiv = document.createElement('div');
  rewardsDiv.className = 'rewards-card';
  rewardsDiv.innerHTML = '<div class="micro">Rewards</div><div class="reward-rows" id="' + which + '_rewards"></div>';
  container.appendChild(rewardsDiv);
  renderRewards(which, week);

  // Buttons
  const btnRow = document.createElement('div');
  btnRow.className = 'btn-row';
  btnRow.innerHTML = '<button class="btn gold" onclick="save();showToast(\'Saved\')"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17,21 17,13 7,13 7,21"/><polyline points="7,3 7,8 15,8"/></svg> Save</button><button class="btn" onclick="confirmNewWeek()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg> New week</button>';
  container.appendChild(btnRow);
}

function allocLabel(bd, count) {
  return count > 0 ? bd.total.toFixed(1) + 'pt pool · ' + bd.perTask.toFixed(1) + 'pt each' : bd.total.toFixed(1) + 'pt pool';
}

// ── MAKE TASK CARD ── (builds a single card, attaches all listeners directly)
function makeTaskCard(t, tier, bd, wk, which) {
  const card = document.createElement('div');
  card.className = 'task-card';
  card.id = 'card_' + t.id;

  // Top row
  const top = document.createElement('div');
  top.className = 'task-top';

  const nameInput = document.createElement('input');
  nameInput.className = 'task-name-input';
  nameInput.placeholder = 'Describe task specifically...';
  nameInput.value = t.name || '';
  // Direct listener — NO re-render, just update state
  nameInput.addEventListener('keydown', e => e.stopPropagation());
  nameInput.addEventListener('input', function() { t.name = this.value; save(); });

  const ptsBadge = document.createElement('span');
  ptsBadge.className = 'pts-badge';
  ptsBadge.id = 'pb_' + t.id;
  ptsBadge.textContent = bd.perTask.toFixed(1) + 'pt';

  const delBtn = document.createElement('button');
  delBtn.className = 'del-btn';
  delBtn.textContent = '✕';
  delBtn.addEventListener('click', () => doRemoveTask(wk, which, tier.key, t.id));

  top.appendChild(nameInput);
  top.appendChild(ptsBadge);
  top.appendChild(delBtn);
  card.appendChild(top);

  // Score row
  card.appendChild(makeScoreRow(t, tier, bd, wk, which));

  return card;
}

function makeScoreRow(t, tier, bd, wk, which) {
  const row = document.createElement('div');
  row.className = 'task-score-row';
  row.id = 'scorerow_' + t.id;

  const typeBtns = document.createElement('div');
  typeBtns.style.cssText = 'display:flex;gap:3px';

  const btnDone = document.createElement('button');
  btnDone.className = 'stype-btn' + (t.type==='done'?' on':'');
  btnDone.textContent = 'Done/not done';
  btnDone.addEventListener('click', () => doSetType(wk, which, tier.key, t.id, 'done'));

  const btnQty = document.createElement('button');
  btnQty.className = 'stype-btn' + (t.type==='qty'?' on':'');
  btnQty.textContent = 'Quantity';
  btnQty.addEventListener('click', () => doSetType(wk, which, tier.key, t.id, 'qty'));

  typeBtns.appendChild(btnDone);
  typeBtns.appendChild(btnQty);
  row.appendChild(typeBtns);

  row.appendChild(makeScoreInputs(t, tier, bd, wk, which));
  return row;
}

function makeScoreInputs(t, tier, bd, wk, which) {
  const wrap = document.createElement('div');
  wrap.className = 'score-inputs';
  wrap.id = 'scoreinputs_' + t.id;

  if (t.type === 'done') {
    const isDone = (parseFloat(t.done)||0) >= 1;
    const btn = document.createElement('button');
    btn.className = 'stype-btn' + (isDone?' on':'');
    btn.textContent = isDone ? '✓ Done' : 'Mark done';
    btn.addEventListener('click', function() {
      t.done = isDone ? 0 : 1;
      save();
      refreshScoreInputs(t, tier, bd, wk, which);
      refreshScores(which, wk==='c'?state.current:state.previous);
    });
    wrap.appendChild(btn);
  } else {
    const doneInput = document.createElement('input');
    doneInput.className = 'num-input';
    doneInput.type = 'number'; doneInput.min = '0';
    doneInput.value = t.done || 0;
    doneInput.addEventListener('keydown', e => e.stopPropagation());
    doneInput.addEventListener('input', function() {
      t.done = Math.max(0, parseFloat(this.value)||0);
      save();
      refreshScores(which, wk==='c'?state.current:state.previous);
    });

    const sep = document.createElement('span');
    sep.className = 'sep'; sep.textContent = '/';

    const tgtInput = document.createElement('input');
    tgtInput.className = 'num-input';
    tgtInput.type = 'number'; tgtInput.min = '1';
    tgtInput.value = t.target || 20;
    tgtInput.addEventListener('keydown', e => e.stopPropagation());
    tgtInput.addEventListener('input', function() {
      t.target = Math.max(1, parseFloat(this.value)||1);
      save();
      refreshScores(which, wk==='c'?state.current:state.previous);
    });

    const preview = document.createElement('span');
    preview.className = 'earned-preview';
    preview.id = 'ep_' + t.id;
    const ratio = Math.min((parseFloat(t.done)||0)/(parseFloat(t.target)||1),1);
    preview.textContent = (ratio * bd.perTask).toFixed(2) + 'pt';

    wrap.appendChild(doneInput);
    wrap.appendChild(sep);
    wrap.appendChild(tgtInput);
    wrap.appendChild(preview);
  }
  return wrap;
}

function refreshScoreInputs(t, tier, bd, wk, which) {
  const wrap = document.getElementById('scoreinputs_' + t.id);
  if (!wrap) return;
  wrap.replaceWith(makeScoreInputs(t, tier, bd, wk, which));
}

// ── MUTATIONS (no full re-render) ──
function doAddTask(wk, which, tierKey) {
  const week = wk==='c' ? state.current : state.previous;
  if (!week) return;
  const newTask = { id: uid(), name:'', type:'done', done:0, target:1 };
  week.tasks[tierKey].push(newTask);
  save();

  const { breakdown } = calcPoints(week);
  const bd = breakdown[tierKey];
  const tier = TIERS.find(t=>t.key===tierKey);

  // Update alloc label
  const allocEl = document.getElementById(which + '_alloc_' + tierKey);
  if (allocEl) allocEl.textContent = allocLabel(bd, week.tasks[tierKey].length);

  // Update existing pts badges
  week.tasks[tierKey].forEach(t => {
    const pb = document.getElementById('pb_' + t.id);
    if (pb) pb.textContent = bd.perTask.toFixed(1) + 'pt';
  });

  // Append new card to task list
  const taskList = document.getElementById(which + '_tasklist_' + tierKey);
  if (taskList) {
    const card = makeTaskCard(newTask, tier, bd, wk, which);
    taskList.appendChild(card);
    // Auto-focus
    setTimeout(() => { const ni = card.querySelector('.task-name-input'); if(ni) ni.focus(); }, 30);
  }

  refreshScores(which, week);
}

function doRemoveTask(wk, which, tierKey, id) {
  const week = wk==='c' ? state.current : state.previous;
  if (!week) return;
  week.tasks[tierKey] = week.tasks[tierKey].filter(t => t.id !== id);
  save();

  // Remove card from DOM
  const card = document.getElementById('card_' + id);
  if (card) card.remove();

  const { breakdown } = calcPoints(week);
  const bd = breakdown[tierKey];

  // Update alloc label
  const allocEl = document.getElementById(which + '_alloc_' + tierKey);
  if (allocEl) allocEl.textContent = allocLabel(bd, week.tasks[tierKey].length);

  // Update remaining pts badges
  week.tasks[tierKey].forEach(t => {
    const pb = document.getElementById('pb_' + t.id);
    if (pb) pb.textContent = bd.perTask.toFixed(1) + 'pt';
  });

  refreshScores(which, week);
}

function doSetType(wk, which, tierKey, id, type) {
  const week = wk==='c' ? state.current : state.previous;
  if (!week) return;
  const t = week.tasks[tierKey].find(t=>t.id===id);
  if (!t) return;
  t.type = type;
  t.done = 0;
  t.target = type==='qty' ? 20 : 1;
  save();

  const { breakdown } = calcPoints(week);
  const tier = TIERS.find(tr=>tr.key===tierKey);
  const bd = breakdown[tierKey];

  // Rebuild just the score row for this task
  const scoreRow = document.getElementById('scorerow_' + id);
  if (scoreRow) scoreRow.replaceWith(makeScoreRow(t, tier, bd, wk, which));

  refreshScores(which, week);
}

// ── SCORE UPDATES (in-place, no re-render) ──
function refreshScores(which, week) {
  updateScoreCard(which, week);
  // Update earned previews
  const { breakdown } = calcPoints(week);
  TIERS.forEach(tier => {
    const bd = breakdown[tier.key];
    (week.tasks[tier.key]||[]).forEach(t => {
      const ep = document.getElementById('ep_' + t.id);
      if (ep) {
        const ratio = Math.min((parseFloat(t.done)||0)/(parseFloat(t.target)||1),1);
        ep.textContent = (ratio * bd.perTask).toFixed(2) + 'pt';
      }
    });
  });
  // Refresh reward highlights
  renderRewards(which, week);
}

function updateScoreCard(which, week) {
  const sc = document.getElementById(which + '_score');
  if (!sc) return;
  const { total } = calcPoints(week);
  const pct = total * 10;
  const barColor = pct>=70?'#3DA882':pct>=50?'#C8912A':'#C0442A';
  const needed = Math.max(0,7-total).toFixed(1);
  let msg = total>=10?'Perfect week. Claim your top reward.':total>=9?'Outstanding — 9+ reward unlocked.':total>=8?'8+ reward unlocked. Push for 9.':total>=7?'Reward unlocked. Push for 8.':total>0?needed+'pt to unlock your reward — stay consistent.':'Add tasks and update scores throughout the week.';
  sc.innerHTML = '<div class="score-row"><div><div class="micro">Score</div><div class="score-big">' + total.toFixed(1) + ' <span style="font-size:18px;color:var(--text3)">/ 10</span></div></div><div style="text-align:right"><div class="micro">Reward from</div><div style="font-size:13px;font-weight:500;color:var(--text2)">' + (total>=7?'<span style="color:var(--green)">Unlocked ✓</span>':needed+'pt needed') + '</div></div></div><div class="bar-wrap"><div class="bar-fill" style="width:'+pct+'%;background:'+barColor+'"></div></div><div class="status-line">'+msg+'</div>';
}

function renderRewards(which, week) {
  const rrows = document.getElementById(which + '_rewards');
  if (!rrows) return;
  const { total } = calcPoints(week);
  // If already built, just update the tier badge outlines (don't rebuild inputs)
  const existing = rrows.querySelectorAll('.r-tier');
  if (existing.length === REWARD_TIERS.length) {
    REWARD_TIERS.forEach((rt, i) => {
      const active = total*10 >= rt.pct;
      existing[i].style.cssText = 'background:'+rt.bg+';color:'+rt.color+';'+(active?'outline:1.5px solid '+rt.color+';':'');
    });
    return;
  }
  // First build
  rrows.innerHTML = '';
  REWARD_TIERS.forEach(rt => {
    const active = total*10 >= rt.pct;
    const row = document.createElement('div');
    row.className = 'reward-row';
    const tier = document.createElement('span');
    tier.className = 'r-tier';
    tier.style.cssText = 'background:'+rt.bg+';color:'+rt.color+';'+(active?'outline:1.5px solid '+rt.color+';':'');
    tier.textContent = rt.label;
    const inp = document.createElement('input');
    inp.className = 'r-input';
    inp.placeholder = 'Set reward...';
    inp.value = week.rewards[rt.label] || '';
    inp.addEventListener('keydown', e => e.stopPropagation());
    inp.addEventListener('input', function() { week.rewards[rt.label] = this.value; save(); });
    row.appendChild(tier);
    row.appendChild(inp);
    rrows.appendChild(row);
  });
}

// ── HISTORY ──
function renderHistory() {
  const container = document.getElementById('view-history');
  container.innerHTML = '';
  if (!state.history || state.history.length===0) {
    container.innerHTML = '<div class="history-empty">No completed weeks yet.<br/>Finish a week and start a new one to see history here.</div>';
    return;
  }
  state.history.forEach((week, idx) => {
    const { total } = calcPoints(week);
    const pct = total*10;
    const scoreColor = pct>=70?'var(--green)':pct>=50?'var(--amber)':'var(--red)';
    const scoreBg = pct>=70?'var(--green-bg)':pct>=50?'var(--amber-bg)':'var(--red-bg)';
    const dateStr = week.weekStart ? 'w/c ' + formatDate(week.weekStart) : 'Week ' + week.weekNumber;
    const card = document.createElement('div');
    card.className = 'archive-card';
    let tasksHtml = TIERS.map(tier => {
      const tasks = week.tasks[tier.key]||[];
      if (!tasks.length) return '';
      return '<div class="archive-tier-label">'+tier.label+'</div>' + tasks.map(t => {
        const scoreStr = t.type==='done' ? ((parseFloat(t.done)||0)>=1?'Done':'Not done') : (t.done||0)+'/'+t.target;
        return '<div class="archive-task-row"><span>'+(esc(t.name)||'(unnamed)')+'</span><span class="archive-task-score">'+scoreStr+'</span></div>';
      }).join('');
    }).join('');
    card.innerHTML = '<div class="archive-header" onclick="toggleArchive('+idx+',this)"><div><div class="archive-week">Week '+week.weekNumber+'</div><div class="archive-meta">'+dateStr+'</div></div><div style="display:flex;align-items:center;gap:10px"><span class="archive-score-badge" style="background:'+scoreBg+';color:'+scoreColor+'">'+(week.finalScore||total).toFixed(1)+' / 10</span><span class="chevron">▾</span></div></div><div class="archive-detail" id="ad_'+idx+'">'+(week.focus?'<div class="archive-focus">"'+esc(week.focus)+'"</div>':'')+tasksHtml+'</div>';
    container.appendChild(card);
  });
}

function toggleArchive(idx, hdr) {
  document.getElementById('ad_'+idx).classList.toggle('open');
  hdr.querySelector('.chevron').classList.toggle('open');
}

// ── NEW WEEK ──
function confirmNewWeek() {
  document.getElementById('modal-root').innerHTML = '<div class="modal-bg"><div class="modal"><h3>Start a new week?</h3><p>Current week saves to history. Make sure you\'ve submitted your weekend accountability first.</p><div class="modal-btns"><button class="modal-btn" onclick="closeModal()">Cancel</button><button class="modal-btn primary" onclick="doNewWeek()">Confirm</button></div></div></div>';
}
function closeModal() { document.getElementById('modal-root').innerHTML = ''; }
function doNewWeek() {
  closeModal();
  archiveCurrent();
  state.current = blankWeek(getWeekNum(), getWeekStart());
  save();
  renderAll();
  switchTab('current');
}

function showToast(msg) {
  const t = document.createElement('div');
  t.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--bg4);border:0.5px solid var(--border);padding:8px 18px;border-radius:var(--radius);font-size:12px;color:var(--text2);z-index:999;transition:opacity .3s';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; setTimeout(()=>t.remove(),300); }, 1500);
}

load();
</script>
</body>
